# orc configuration
#
# orc-dev-branch: the name of the branch orc uses as its integration branch.
#   All feature branches are merged here after QA passes, and `orc merge`
#   fast-forwards this branch into main.  Change this if your project already
#   uses a branch named "dev" for something else (e.g. "orc-dev" or "staging").
orc-dev-branch: dev
