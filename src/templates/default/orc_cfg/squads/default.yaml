name: default
description: |
  Default squad: one agent of each type, running sequentially.
  Lowest-risk configuration; ideal for small projects or initial setup.
  Agents run in confined mode — only approved tools are available.

# LLM provider: "gemini" (default), "github", or "openai"
provider: gemini

# Tool permissions for all agents (board tools, file access, and git are
# always included). Add role-specific overrides under each composition entry.
permissions:
  mode: confined              # or set it to "yolo" if you like to live dangerously
  # allow_tools:              # grant extra tools to ALL roles
  #                           # (`just` is already in orc defaults — no need to add it)
  #   - "shell(uv:*)"         # python (uv)
  #   - "shell(npm:*)"        # javascript (npm)
  #   - "shell(cargo:*)"      # rust (cargo)
  #   - "shell(pytest:*)"     # direct pytest (prefer `just test` instead)
  # deny_tools:               # revoke a default tool from ALL roles, e.g.:
  #   - "shell(git push:*)"   # prevent direct pushes

composition:
  - role: planner
    count: 1
    model: gemini-2.5-pro
    permissions:
      deny_tools:
        - "write"              # planner must NOT edit source code
        - "shell(uv:*)"
        - "shell(pytest:*)"
  - role: coder
    count: 1
    model: gemini-2.5-pro
    # permissions:     # uncomment to give coders extra tools, e.g.:
    #   allow_tools:
    #     - "shell(npm:*)"
    #     - "shell(cargo:*)"
  - role: qa
    count: 1
    model: gemini-2.5-pro
    # review-threshold: LOW  # CRITICAL, HIGH, MID, or LOW (default: LOW)
    #   Controls the minimum severity at which QA rejects work back to coders.
    #   CRITICAL = only reject critical failures, LOW = reject any issue.
  - role: merger
    count: 1
    model: gemini-2.5-pro

timeout_minutes: 120
