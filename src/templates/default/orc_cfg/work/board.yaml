# orc kanban board
#
# counter  – next available task ID (integer; format as 4-digit zero-padded
#            string when naming files, e.g. counter=3 → "0003-title.md").
#            The planner increments this every time it creates a new task.
#
# tasks    – active tasks on the board.  Each entry has at minimum a ``name``
#            field (the task filename) and a ``status`` field (one of:
#            planned, in-progress, in-review, done, blocked, stuck).
#            Tasks are removed from this list when merged into dev.

counter: 1

tasks: []
