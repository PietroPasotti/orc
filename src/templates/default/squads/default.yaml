name: default
description: |
  Default squad: one agent of each type, running sequentially.
  Lowest-risk configuration; ideal for small projects or initial setup.

composition:
  - role: planner
    count: 1
    model: claude-sonnet-4.6
  - role: coder
    count: 1
    model: claude-sonnet-4.6
  - role: qa
    count: 1
    model: claude-sonnet-4.6

timeout_minutes: 120
