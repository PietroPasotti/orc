name: default
description: |
  Default squad: one agent of each type, running sequentially.
  Lowest-risk configuration; ideal for small projects or initial setup.
  Agents run in confined mode — only approved tools are available.

provider: gemini

# Tool permissions for all agents (orc MCP tools, file access, and git are
# always included). Add role-specific overrides under each composition entry.
permissions:
  mode: confined              # or set it to "yolo" if you like to live dangerously
  allow_tools:                # grant extra tools to ALL roles
    - "shell(uv:*)"           # python (uv)
    - "shell(pytest:*)"       # direct pytest

composition:
  - role: planner
    count: 1
    model: gemini-2.5-pro
    permissions:
      deny_tools:
        - "write"              # planner must NOT edit source code
        - "shell(uv:*)"
        - "shell(pytest:*)"
  - role: coder
    count: 1
    model: gemini-2.5-pro
  - role: merger
    count: 1
    model: gemini-2.5-pro
  - role: qa
    count: 1
    model: gemini-2.5-pro

timeout_minutes: 120
