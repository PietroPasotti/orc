name: default
description: |
  Default squad: one agent of each type, running sequentially.
  Lowest-risk configuration; ideal for small projects or initial setup.
  Agents run in confined mode — only approved tools are available.

# Tool permissions for all agents (orc MCP tools, file access, and git are
# always included). Add role-specific overrides under each composition entry.
permissions:
  mode: confined
  deny_tools:
    - "shell(just release:*)"  # release is maintainers-only in this project

composition:
  - role: planner
    count: 1
    model: claude-opus-4.6
    # No shell tools needed — planners only write task and ADR files.

  - role: coder
    count: 5
    model: claude-sonnet-4.6
    permissions:
      allow_tools:
        - "shell(just:*)"  # just test (TDD loop), just fmt (auto-fix ruff), just lint

  - role: qa
    count: 1
    model: claude-sonnet-4.6
    permissions:
      allow_tools:
        - "shell(just:*)"  # just test (verify suite passes), just lint (ruff + mypy)

timeout_minutes: 120
